name: Publish to NuGet

on:
  release:
    types: [published]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  NuGetDirectory: ${{ github.workspace }}/nuget

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Set version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: dotnet pack src/ForgeMap/ForgeMap.csproj --configuration Release --no-build --no-restore --output ${{ env.NuGetDirectory }} /p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v7
        with:
          name: nuget
          if-no-files-found: error
          path: ${{ env.NuGetDirectory }}/*.nupkg

      - name: Upload symbol package artifact
        uses: actions/upload-artifact@v7
        with:
          name: nuget-symbols
          if-no-files-found: warn
          path: ${{ env.NuGetDirectory }}/*.snupkg

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download NuGet package
        uses: actions/download-artifact@v4
        with:
          name: nuget
          path: ${{ env.NuGetDirectory }}

      - name: Download symbol package
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: nuget-symbols
          path: ${{ env.NuGetDirectory }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish NuGet package
        run: dotnet nuget push ${{ env.NuGetDirectory }}/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish symbol package
        run: |
          shopt -s nullglob
          snupkgs=(${{ env.NuGetDirectory }}/*.snupkg)
          if [ ${#snupkgs[@]} -gt 0 ]; then
            dotnet nuget push ${{ env.NuGetDirectory }}/*.snupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
          fi
