name: Question
description: Ask a question about ForgeMap
title: "[Question] "
labels: ["question"]
body:
  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - Usage
        - Configuration
        - Migration from AutoMapper
        - Migration from Mapperly
        - Other
    validations:
      required: true

  - type: textarea
    id: what-tried
    attributes:
      label: What have you tried?
      description: Describe what you've already tried or researched.
    validations:
      required: true

  - type: textarea
    id: code-snippets
    attributes:
      label: Code Snippets
      description: If applicable, share relevant code.
      render: csharp

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context about your question.
